name: Delete Barry's Opportunities

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run? (true = preview only, false = actually delete)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  delete-opportunities:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run opportunity cleaner
        env:
          CLOSE_API_KEY: ${{ secrets.CLOSE_API_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: python delete_opportunities.py

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opportunity-deletion-log
          path: opportunity_deletion_log.txt
          retention-days: 30
